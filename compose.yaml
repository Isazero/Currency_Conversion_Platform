services:
  api:
    build:
      context: .
      dockerfile: Currency_Conversion_Platform/Dockerfile
    image: currency-conversion-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/currency.db
      - Jwt__SecretKey=docker-dev-secret-key-32-chars-minimum!
    volumes:
      - api-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./currency-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - frontend

volumes:
  api-data:
